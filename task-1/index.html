        <div class="commentsList_2943a085" id="commentsList"></div>
        <div id="noComments" class="noComments_2943a085" hidden>No comments</div>
      </section>
    </div>
  </main>

  <script>
    const categoryConfig = {
      Education: { iconClass: 'fa-solid fa-graduation-cap', className: 'categoryTraining_2943a085' },
      'Public Speaking': { iconClass: 'fa-solid fa-chalkboard-user', className: 'categoryContribution_2943a085' },
      'University Partnership': { iconClass: 'fa-solid fa-face-smile', className: 'categoryCommunity_2943a085' },
      Mentoring: { iconClass: 'fa-solid fa-user-group', className: 'categoryContribution_2943a085' },
      Dev2Dev: { iconClass: 'fa-solid fa-code', className: 'categoryTraining_2943a085' }
    };

    const avatarUrl = 'https://avatars.githubusercontent.com/u/278784460?v=4&size=64';
    const firstNameParts = {
      prefixes: ['Ari', 'Bel', 'Cai', 'Dae', 'Eli', 'Fio', 'Gra', 'Hae', 'Iri', 'Jae', 'Kio', 'Lia', 'Mira', 'Nora', 'Oli', 'Pha', 'Rae', 'Sia', 'Tora', 'Vela', 'Wyn', 'Zara'],
      middles: ['a', 'e', 'i', 'o', 'u', 'ae', 'ia', 'io', 'oa', 'ui', ''],
      suffixes: ['la', 'na', 'ra', 'ta', 'sa', 'ma', 'va', 'ya', 'ri', 'len', 'mir', 'ton', 'vin', 'lia', 'sha', 'n']
    };
    const lastNameParts = {
      prefixes: ['Ash', 'Briar', 'Cedar', 'Dune', 'Ember', 'Frost', 'Glen', 'Harbor', 'Ivory', 'Juniper', 'Kestrel', 'Linden', 'Morrow', 'North', 'Oak', 'Pine', 'Quartz', 'River', 'Stone', 'Thorne', 'Umber', 'Vale', 'Willow', 'Yarrow', 'Zephyr'],
      middles: ['a', 'e', 'i', 'o', 'u', 'ar', 'er', 'ia', 'io', 'or', ''],
      suffixes: ['son', 'berg', 'brook', 'field', 'ford', 'hart', 'holm', 'land', 'more', 'ridge', 'shaw', 'stone', 'vale', 'wood', 'wright', 'well']
    };
    const roleTemplates = ['Senior Software Engineer', 'Lead QA Engineer', 'Product Designer', 'Data Analyst', 'Engineering Manager', 'Business Analyst', 'Frontend Engineer', 'Backend Engineer', 'Platform Engineer', 'UX Researcher'];
    const topicPool = ['API design', 'delivery planning', 'pairing habits', 'quality automation', 'team demos', 'onboarding', 'system design', 'technical writing', 'student mentoring', 'peer coaching', 'release readiness', 'design systems'];
    const commentTemplates = [
      'This row has the score breakdown I need, so I can validate the activity list quickly.',
      'The filters are doing the right thing here. Search first, then narrow by quarter if needed.',
      'Please keep the activity history clean so the totals stay easy to review later.',
      'The leaderboard should stay transparent, so the breakdown table matters more than the total.',
      'The row expansion is the fastest way to verify where the points came from.'
    ];
    const activityTemplates = {
      Education: ['Hosted a workshop on {topic}', 'Prepared a learning recap on {topic}', 'Shared a walkthrough on {topic}'],
      'Public Speaking': ['Presented on {topic} at the team forum', 'Led a talk about {topic} for peers', 'Shared a live demo on {topic}'],
      'University Partnership': ['Coordinated a university session about {topic}', 'Supported a partner workshop on {topic}', 'Mentored students during a collaboration on {topic}'],
      Mentoring: ['Mentored teammates on {topic}', 'Coached a squad through {topic}', 'Ran a mentoring session about {topic}'],
      Dev2Dev: ['Delivered a Dev2Dev session on {topic}', 'Organized a Dev2Dev lab about {topic}', 'Presented a Dev2Dev walkthrough on {topic}']
    };

    function buildDate(year, monthIndex, day) {
      return `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    function seededValue(index, salt) {
      const raw = Math.sin((index + 1) * (salt + 1) * 12.9898) * 43758.5453;
      return raw - Math.floor(raw);
    }

    function pickPart(parts, index, salt) {
      const value = seededValue(index, salt);
      return parts[Math.floor(value * parts.length) % parts.length];
    }

    function buildFirstName(index) {
      const value = `${pickPart(firstNameParts.prefixes, index, 1)}${pickPart(firstNameParts.middles, index, 2)}${pickPart(firstNameParts.suffixes, index, 3)}`.replace(/[^a-z]/gi, '');
      return value.charAt(0).toUpperCase() + value.slice(1).toLowerCase();
    }

    function buildSurname(index) {
      const value = `${pickPart(lastNameParts.prefixes, index, 4)}${pickPart(lastNameParts.middles, index, 5)}${pickPart(lastNameParts.suffixes, index, 6)}`.replace(/[^a-z]/gi, '');
      return value.charAt(0).toUpperCase() + value.slice(1).toLowerCase();
    }

    function buildActivities(index) {
      const categories = Object.keys(categoryConfig);
      return [0, 1, 2].map((offset) => {
        const category = categories[(index + offset) % categories.length];
        const templates = activityTemplates[category];
        const topic = topicPool[(index * 3 + offset) % topicPool.length];
        const title = templates[(index + offset) % templates.length].replace('{topic}', topic);
        const monthIndex = (index * 2 + offset * 3) % 12;
        const day = ((index * 5 + offset * 7) % 27) + 1;
        const points = [8, 16, 24, 32, 48, 64][(index * 2 + offset * 3) % 6];
        return { title, category, date: buildDate(2025, monthIndex, day), points };
      }).sort((left, right) => new Date(right.date) - new Date(left.date));
    }

    function buildComment(index, full) {
      const day = 25 - (index % 20);
      const hour = 8 + (index % 9);
      const minute = 10 + (index % 40);
      return {
        id: `c${index + 1}`,
        author: full,
        avatar: avatarUrl,
        date: new Date(Date.UTC(2026, 1, day, hour, minute)).toISOString(),
        likes: ((index * 3) % 17) + 1,
        text: commentTemplates[index % commentTemplates.length]
      };
    }

    function buildUsers(count = 200) {
      return Array.from({ length: count }, (_, index) => {
        const name = buildFirstName(index);
        const surname = buildSurname(index);
        const role = `${roleTemplates[index % roleTemplates.length]} ${index + 1}`;
        const full = `${name} ${surname}`;
        return {
          name,
          surname,
          role,
          avatar: avatarUrl,
          expanded: false,
          activity: buildActivities(index),
          comments: index < 5 ? [buildComment(index, full)] : []
        };
      });
    }

    const users = buildUsers();

    const state = { filters: { year: 'All Years', quarter: 'All Quarters', category: 'All Categories', search: '' }, commentSort: 'newest', openFilter: null, expandedUsers: new Set(users.filter((user) => user.expanded).map((user) => `${user.name} ${user.surname}`)) };
    const elements = { podium: document.getElementById('podium'), userList: document.getElementById('userList'), noResults: document.getElementById('noResults'), commentsList: document.getElementById('commentsList'), noComments: document.getElementById('noComments'), employeeSearch: document.getElementById('employeeSearch'), commentComposerAvatar: document.querySelector('[data-comment-avatar]') };
    const years = [...new Set(users.flatMap((user) => user.activity.map((activity) => String(new Date(activity.date).getFullYear()))))].sort((left, right) => Number(right) - Number(left));
    const quarterOptions = ['All Quarters', 'Q1', 'Q2', 'Q3', 'Q4'];
    const categoryOptions = ['All Categories', ...Object.keys(categoryConfig)];

    function getQuarter(dateString) { return `Q${Math.floor(new Date(dateString).getMonth() / 3) + 1}`; }
    function fullName(user) { return `${user.name} ${user.surname}`; }
    function initials(user) { return `${user.name[0]}${user.surname[0]}`.toUpperCase(); }
    function formatDate(dateString) { return new Intl.DateTimeFormat('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).format(new Date(dateString)); }
    function formatCommentDate(dateString) { return new Intl.DateTimeFormat('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(new Date(dateString)); }
    function getUserScore(user) { return user.activity.reduce((total, activity) => total + activity.points, 0); }
    function getCategoryCounts(user) { return user.activity.reduce((counts, activity) => { counts[activity.category] = (counts[activity.category] || 0) + 1; return counts; }, {}); }
    function filterActivities(user) { const search = state.filters.search.trim().toLowerCase(); return user.activity.filter((activity) => (!search || fullName(user).toLowerCase().includes(search)) && (state.filters.year === 'All Years' || String(new Date(activity.date).getFullYear()) === state.filters.year) && (state.filters.quarter === 'All Quarters' || getQuarter(activity.date) === state.filters.quarter) && (state.filters.category === 'All Categories' || activity.category === state.filters.category)); }

    function closeDropdowns() { document.querySelectorAll('.filterGroup_2943a085').forEach((group) => { group.querySelector('.filterControl_2943a085').classList.remove('is-open'); group.querySelector('.filterControl_2943a085').setAttribute('aria-expanded', 'false'); group.querySelector('.dropdownPanel_2943a085').classList.remove('open'); }); state.openFilter = null; }
    function openDropdown(group) { const key = group.dataset.filter; const isOpen = state.openFilter === key; closeDropdowns(); if (!isOpen) { group.querySelector('.filterControl_2943a085').classList.add('is-open'); group.querySelector('.filterControl_2943a085').setAttribute('aria-expanded', 'true'); group.querySelector('.dropdownPanel_2943a085').classList.add('open'); state.openFilter = key; } }
    function renderFilterLists() { document.querySelectorAll('.filterGroup_2943a085').forEach((group) => { const type = group.dataset.filter; const list = group.querySelector('.dropdownList_2943a085'); const valueDisplay = group.querySelector('.filterValue_2943a085'); const values = type === 'year' ? ['All Years', ...years] : type === 'quarter' ? quarterOptions : categoryOptions; valueDisplay.textContent = state.filters[type]; list.innerHTML = values.map((value) => `<button type="button" class="dropdownItem_2943a085 ${state.filters[type] === value ? 'is-selected' : ''}" role="option" aria-selected="${state.filters[type] === value}" data-value="${value}">${value}</button>`).join(''); }); }
    function podiumMarkup(usersList) { return usersList.slice(0, 3).map((user, index) => { const rank = [1, 2, 3][index]; const size = rank === 1 ? 112 : 80; const badgeSize = rank === 1 ? 40 : 32; return `<article class="podiumColumn_2943a085 podiumRank${rank}_2943a085"><div class="podiumUser_2943a085"><div class="podiumAvatarContainer_2943a085"><div class="podiumAvatar_2943a085" style="width:${size}px;height:${size}px;background-image:url('${user.avatar}');">${fullName(user)}</div><div class="podiumRankBadge_2943a085" style="width:${badgeSize}px;height:${badgeSize}px;">${rank}</div></div><h3 class="podiumName_2943a085">${fullName(user)}</h3><p class="podiumRole_2943a085">${user.role}</p><div class="podiumScore_2943a085"><i class="scoreIcon_2943a085 fa-solid fa-star" aria-hidden="true"></i><span>${getUserScore(user)}</span></div></div><div class="podiumBlock_2943a085" data-rank="${rank}"><div class="podiumBlockTop_2943a085"></div><span class="podiumRankNumber_2943a085">${rank}</span></div></article>`; }).join(''); }
    function userCardMarkup(user, index) { const full = fullName(user); const expanded = state.expandedUsers.has(full); const categoryCounts = getCategoryCounts(user); const activities = filterActivities(user); const activeCategories = Object.entries(categoryCounts).map(([category, count]) => { const config = categoryConfig[category] || { iconClass: 'fa-solid fa-circle', className: 'categoryDefault_2943a085' }; return `<div class="categoryStat_2943a085" title="${category}"><div class="categoryIcon_2943a085" aria-hidden="true"><i class="${config.iconClass}"></i></div><div class="categoryCount_2943a085">${count}</div></div>`; }).join(''); const rows = activities.map((activity) => { const config = categoryConfig[activity.category] || { className: 'categoryDefault_2943a085' }; return `<tr><td class="activityName_2943a085">${activity.title}</td><td><span class="categoryBadge_2943a085 ${config.className}">${activity.category}</span></td><td class="activityDate_2943a085">${formatDate(activity.date)}</td><td class="activityPoints_2943a085">+${activity.points}</td></tr>`; }).join(''); return `<article class="userRowContainer_2943a085 ${expanded ? 'expanded_2943a085' : ''}" data-user="${full}"><div class="userRow_2943a085"><div class="userIdentity_2943a085"><div class="rank_2943a085">${index + 1}</div><div class="avatar_2943a085" style="width:58px;height:58px;background-image:url('${user.avatar}');">${full}</div><div class="userInfo_2943a085"><h3 class="userName_2943a085">${full}</h3><p class="userRole_2943a085">${user.role}</p></div></div><div class="userStats_2943a085">${activeCategories}<div class="userTotal_2943a085"><div class="totalLabel_2943a085">TOTAL</div><div class="totalScore_2943a085"><i class="scoreIcon_2943a085 fa-solid fa-star" aria-hidden="true"></i><span>${getUserScore(user)}</span></div></div><button class="expandButton_2943a085" type="button" data-action="toggle-user" aria-label="${expanded ? 'Collapse' : 'Expand'} activities"><i class="fa-solid fa-chevron-down" aria-hidden="true"></i></button></div></div><div class="details_2943a085"><h4 class="detailsTitle_2943a085">Recent Activity</h4><div class="tableWrapper_2943a085"><table class="activityTable_2943a085"><thead><tr><th>Activity</th><th>Category</th><th>Date</th><th>Points</th></tr></thead><tbody>${rows || '<tr><td colspan="4" class="activityDate_2943a085">No activities match the selected filters.</td></tr>'}</tbody></table></div></div></article>`; }
    function renderLeaderboard() { const searchTerm = state.filters.search.trim(); const filteredUsers = users.map((user) => ({ user, activities: filterActivities(user) })).filter(({ activities }) => activities.length > 0 || (searchTerm === '' && state.filters.year === 'All Years' && state.filters.quarter === 'All Quarters' && state.filters.category === 'All Categories')).sort((left, right) => getUserScore(right.user) - getUserScore(left.user)); elements.podium.innerHTML = podiumMarkup(filteredUsers.map(({ user }) => user)); if (filteredUsers.length === 0) { elements.userList.innerHTML = ''; elements.noResults.hidden = false; } else { elements.noResults.hidden = true; elements.userList.innerHTML = filteredUsers.map(({ user }, index) => userCardMarkup(user, index)).join(''); } }
    function renderComments() { const allComments = users.flatMap((user) => user.comments.map((comment) => ({ ...comment, userName: fullName(user) }))); const sorted = [...allComments].sort((left, right) => state.commentSort === 'oldest' ? new Date(left.date) - new Date(right.date) : state.commentSort === 'popular' ? right.likes - left.likes || new Date(right.date) - new Date(left.date) : new Date(right.date) - new Date(left.date)); elements.commentsList.innerHTML = sorted.map((comment) => `<article class="commentCard_2943a085"><div class="commentTop_2943a085"><div class="commentAvatar_2943a085" style="background-image:url('${comment.avatar || avatarUrl}');">${comment.author}</div><div class="commentMeta_2943a085"><p class="commentName_2943a085">${comment.author}</p><div class="commentDate_2943a085">${formatCommentDate(comment.date)} · ${comment.userName}</div></div></div><p class="commentContent_2943a085">${comment.text}</p><div class="commentActions_2943a085"><span>Reply · Share</span><span class="commentLikes_2943a085">♥ ${comment.likes}</span></div></article>`).join(''); elements.noComments.hidden = sorted.length > 0; }
    function applyFilter(type, value) { state.filters[type] = value; renderFilterLists(); renderLeaderboard(); }
    function bindEvents() { document.addEventListener('click', (event) => { const filterGroup = event.target.closest('.filterGroup_2943a085'); const filterControl = event.target.closest('.filterControl_2943a085'); const dropdownItem = event.target.closest('.dropdownItem_2943a085'); const expandButton = event.target.closest('[data-action="toggle-user"]'); const commentSortButton = event.target.closest('.commentNavItem_2943a085'); if (expandButton) { const card = expandButton.closest('.userRowContainer_2943a085'); const userName = card.dataset.user; if (state.expandedUsers.has(userName)) { state.expandedUsers.delete(userName); card.classList.remove('expanded_2943a085'); expandButton.setAttribute('aria-label', 'Expand activities'); } else { state.expandedUsers.add(userName); card.classList.add('expanded_2943a085'); expandButton.setAttribute('aria-label', 'Collapse activities'); } return; } if (commentSortButton) { state.commentSort = commentSortButton.dataset.sort; document.querySelectorAll('.commentNavItem_2943a085').forEach((button) => { const active = button === commentSortButton; button.classList.toggle('active', active); button.setAttribute('aria-selected', String(active)); }); renderComments(); return; } if (dropdownItem) { const group = dropdownItem.closest('.filterGroup_2943a085'); applyFilter(group.dataset.filter, dropdownItem.dataset.value); closeDropdowns(); return; } if (filterControl && filterGroup) { openDropdown(filterGroup); return; } if (!event.target.closest('.filterGroup_2943a085')) { closeDropdowns(); } }); window.addEventListener('scroll', closeDropdowns, { passive: true }); window.addEventListener('resize', closeDropdowns); elements.employeeSearch.addEventListener('input', (event) => { state.filters.search = event.target.value; renderLeaderboard(); }); }
    function init() { if (elements.commentComposerAvatar) { elements.commentComposerAvatar.style.backgroundImage = `url('${users[0]?.avatar || avatarUrl}')`; } renderFilterLists(); renderLeaderboard(); renderComments(); bindEvents(); }
    init();
  </script>
